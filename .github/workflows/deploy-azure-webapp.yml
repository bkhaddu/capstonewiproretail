name: Deploy to Azure Container App

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: retail-optimization-platform
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINERAPP_NAME }}
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core CLI
        run: |
          dotnet tool update --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore project for EF
        run: dotnet restore RetailOptimizationPlatform.csproj

      - name: List pending EF migrations
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          dotnet ef migrations list \
            --project RetailOptimizationPlatform.csproj \
            --startup-project RetailOptimizationPlatform.csproj \
            --connection "$AZURE_SQL_CONNECTION_STRING"

      - name: Apply EF Core migrations to Azure SQL
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          dotnet ef database update \
            --project RetailOptimizationPlatform.csproj \
            --startup-project RetailOptimizationPlatform.csproj \
            --connection "$AZURE_SQL_CONNECTION_STRING" \
            --verbose

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}
          IMAGE_LATEST=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:latest
          docker build -t $IMAGE_URI .
          docker tag $IMAGE_URI $IMAGE_LATEST
          docker push $IMAGE_URI
          docker push $IMAGE_LATEST
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_URI"
