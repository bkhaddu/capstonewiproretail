name: Deploy to Azure Container App

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: retail-optimization-platform
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINERAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}
          IMAGE_LATEST=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:latest
          docker build -t $IMAGE_URI .
          docker tag $IMAGE_URI $IMAGE_LATEST
          docker push $IMAGE_URI
          docker push $IMAGE_LATEST
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_URI"
